name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build -o room ./cmd/room

      - name: Verify help commands
        run: |
          ./room --help >/dev/null
          ./room init --help >/dev/null
          ./room run --help >/dev/null
          ./room status --help >/dev/null
          ./room doctor --help >/dev/null
          ./room inspect --help >/dev/null
          ./room version >/dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
